name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t brain-tumor-app .

      - name: Tag Image
        run: |
          docker tag brain-tumor-app:latest \
          522294739238.dkr.ecr.us-east-1.amazonaws.com/brain-tumor-app:latest

      - name: Push Image
        run: |
          docker push \
          522294739238.dkr.ecr.us-east-1.amazonaws.com/brain-tumor-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 522294739238.dkr.ecr.us-east-1.amazonaws.com

            docker pull 522294739238.dkr.ecr.us-east-1.amazonaws.com/brain-tumor-app:latest

            docker stop brain-tumor-container || true
            docker rm brain-tumor-container || true

            docker run -d \
              -p 8080:5000 \
              --name brain-tumor-container \
              522294739238.dkr.ecr.us-east-1.amazonaws.com/brain-tumor-app:latest